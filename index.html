<title>ИИзация - экспресс-диагностика бизнеса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f2f0;
    --surface: #fcfcf7;
    --surface-2: #eceae3;
    --ink: #141414;
    --muted: rgba(20,20,20,0.6);
    --faint: rgba(20,20,20,0.42);
    --line: rgba(20,20,20,0.14);
    --line-strong: rgba(20,20,20,0.3);
    --cream: #e7dfd0;
    --green: #141414;
    --green-deep: #000000;
    --green-soft: #e7dfd0;
    --bronze: #141414;
    --bronze-soft: #e7dfd0;
    --shadow: 0 1px 2px rgba(20,20,20,.03), 0 10px 34px rgba(20,20,20,.07);
    --r: 6px;
    --serif: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    --sans: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .shell {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px 64px;
    min-height: 100vh;
  }

  /* Header */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
  }
  .mg-logo { height: 26px; width: auto; display: block; --fill-0: #141414; }
  .top .brand-link { display: inline-flex; align-items: center; }
  .step-count {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--faint);
    font-variant-numeric: tabular-nums;
  }

  .progress {
    height: 4px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 30px;
  }
  .progress > i {
    display: block;
    height: 100%;
    width: 0%;
    background: var(--ink);
    border-radius: 99px;
    transition: width .45s cubic-bezier(.4,0,.1,1);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    padding: 34px 32px 30px;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 11px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 16px;
    font-weight: 600;
  }
  .eyebrow::before {
    content: "";
    width: 30px;
    height: 9px;
    background: var(--ink);
    flex: none;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 800;
    font-size: clamp(30px, 5vw, 46px);
    line-height: 1.02;
    letter-spacing: -.02em;
    text-transform: uppercase;
    margin: 0 0 18px;
    text-wrap: balance;
  }
  h2.q {
    font-family: var(--serif);
    font-weight: 800;
    font-size: clamp(21px, 3.4vw, 30px);
    line-height: 1.08;
    letter-spacing: -.02em;
    text-transform: uppercase;
    margin: 0 0 8px;
    text-wrap: balance;
  }
  .q-hint {
    color: var(--muted);
    font-size: 15px;
    margin: 0 0 22px;
  }
  .lede {
    font-size: 17px;
    color: var(--muted);
    margin: 0 0 26px;
    max-width: 56ch;
  }

  /* Intro meta */
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 26px;
    margin: 0 0 30px;
    padding: 18px 0 0;
    border-top: 1px solid var(--line);
  }
  .meta-row div {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 14px;
    color: var(--muted);
  }
  .meta-row b {
    font-family: var(--mono);
    font-weight: 800;
    color: var(--ink);
    font-size: 16px;
  }

  /* Options */
  .opts { display: grid; gap: 10px; }
  .opts.two { grid-template-columns: 1fr 1fr; }
  @media (max-width: 480px) { .opts.two { grid-template-columns: 1fr; } }

  .opt {
    display: flex;
    align-items: center;
    gap: 13px;
    text-align: left;
    width: 100%;
    padding: 15px 16px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--r);
    font-family: var(--sans);
    font-size: 15.5px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .06s;
  }
  .opt:hover { border-color: var(--ink); background: #fff; }
  .opt:active { transform: scale(.994); }
  .opt:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
  .opt .mark {
    flex: none;
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--line-strong);
    background: #fff;
    display: grid;
    place-items: center;
    transition: all .15s;
  }
  .opt.round .mark { border-radius: 99px; }
  .opt .mark svg { width: 13px; height: 13px; opacity: 0; transform: scale(.5); transition: all .15s; }
  .opt.on {
    border-color: var(--ink);
    background: var(--cream);
  }
  .opt.on .mark { background: var(--ink); border-color: var(--ink); }
  .opt.on .mark svg { opacity: 1; transform: scale(1); stroke: #fff; }
  .opt .lbl { flex: 1; }
  .opt .lbl small { display: block; color: var(--muted); font-size: 13px; margin-top: 1px; }

  input.txt {
    width: 100%;
    padding: 14px 16px;
    font-family: var(--sans);
    font-size: 16px;
    color: var(--ink);
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--r);
    margin-bottom: 12px;
  }
  input.txt:focus { outline: none; border-color: var(--ink); background: #fff; }
  input.txt::placeholder { color: var(--faint); }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 28px;
  }
  .btn {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    padding: 15px 30px;
    border-radius: 40px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: transform .15s ease, background .15s, opacity .15s;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { transform: translateY(-2px); opacity: .92; }
  .btn-primary:disabled { opacity: .28; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }
  .btn-ghost:hover { border-color: var(--ink); transform: translateY(-2px); }
  .btn-back { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 15px; padding: 8px 4px; }
  .btn-back:hover { color: var(--ink); }

  /* Result */
  .verdict {
    display: flex;
    align-items: flex-start;
    gap: 18px;
    padding: 26px 24px;
    border-radius: var(--r);
    background: var(--ink);
    color: #fff;
    margin-bottom: 24px;
  }
  .verdict .lvl-num {
    font-family: var(--serif);
    font-size: 46px;
    line-height: .9;
    font-weight: 800;
    flex: none;
    color: var(--cream);
  }
  .verdict h3 { margin: 0 0 6px; font-family: var(--serif); font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: -.01em; line-height: 1.1; }
  .verdict p { margin: 0; font-size: 14.5px; opacity: .82; }

  .roi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 480px) { .roi-grid { grid-template-columns: 1fr; } }
  .stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 17px 18px;
  }
  .roi-grid .stat:nth-child(2) { background: var(--cream); border-color: transparent; }
  .stat .k { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .stat .v { font-family: var(--serif); font-size: 28px; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
  .stat .v small { font-size: 14px; font-weight: 600; color: var(--muted); font-family: var(--sans); }

  .block-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 28px 0 13px;
  }
  .block-title::before { content: ""; width: 22px; height: 7px; background: var(--ink); flex: none; }
  .incl { list-style: none; padding: 0; margin: 0; display: grid; gap: 9px; }
  .incl li { display: flex; gap: 11px; font-size: 15px; color: var(--ink); align-items: flex-start; }
  .incl li svg { flex: none; margin-top: 4px; }
  .tiers { display: grid; gap: 8px; margin-top: 4px; }
  .tier {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    padding: 14px 16px; border-radius: var(--r); border: 1px solid var(--line); background: var(--surface);
    font-size: 14.5px;
  }
  .tier.pick { border-color: transparent; background: var(--ink); color: #fff; }
  .tier .nm { font-weight: 700; }
  .tier .nm small { display:block; font-weight: 500; color: var(--muted); font-size: 12.5px; }
  .tier.pick .nm small { color: rgba(255,255,255,.7); }
  .tier .pr { font-family: var(--mono); font-weight: 600; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .tier.pick .pr { color: var(--cream); }

  .send-box {
    margin-top: 28px;
    padding: 24px;
    border-radius: var(--r);
    background: var(--cream);
  }
  .send-box h4 { margin: 0 0 7px; font-family: var(--serif); font-size: 19px; font-weight: 800; text-transform: uppercase; letter-spacing: -.01em; }
  .send-box p { margin: 0 0 16px; color: rgba(20,20,20,.7); font-size: 14.5px; }
  .send-actions { display: flex; flex-wrap: wrap; gap: 10px; }
  .send-actions .btn { padding: 13px 24px; font-size: 15px; }
  .btn-tg { background: var(--ink); color: #fff; }
  .btn-tg:hover { transform: translateY(-2px); opacity: .92; }
  .send-box .btn-ghost { background: transparent; border-color: rgba(20,20,20,.35); color: var(--ink); }
  .send-box .btn-ghost:hover { border-color: var(--ink); }
  .toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 99px;
    font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .foot {
    margin-top: 40px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px 24px;
    flex-wrap: wrap;
  }
  .foot-brand { display: flex; align-items: center; gap: 16px; }
  .foot .mg-logo { height: 22px; }
  .foot-svc { font-size: 13px; color: var(--muted); max-width: 22ch; line-height: 1.35; padding-left: 16px; border-left: 1px solid var(--line); }
  .foot-contacts { display: flex; flex-direction: column; gap: 4px; font-family: var(--mono); font-size: 12.5px; font-weight: 500; letter-spacing: .01em; text-align: right; }
  .foot-contacts a { color: var(--ink); text-decoration: none; }
  .foot-contacts a:hover { opacity: .6; }
  @media (max-width: 480px) {
    .foot { justify-content: flex-start; }
    .foot-contacts { text-align: left; align-items: flex-start; }
  }
  .disclaimer { font-size: 12.5px; color: var(--faint); margin-top: 18px; line-height: 1.5; }

  .hide { display: none !important; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

  function esc(s){ return String(s||"").replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }

  function questionSteps(){ return STEPS.filter(function(s){ return s.type!=="intro" && s.type!=="result"; }); }

  function render() {
    var step = STEPS[idx];
    var qSteps = questionSteps();
    var qNum = 0, total = qSteps.length;
    for (var i=1;i<=idx;i++){ if(STEPS[i] && STEPS[i].type!=="intro" && STEPS[i].type!=="result") qNum++; }

    if (step.type === "intro" || step.type === "result") {
      counter.textContent = "";
    } else {
      counter.textContent = "Вопрос " + qNum + " / " + total;
    }
    var pct = step.type==="result" ? 100 : (step.type==="intro" ? 0 : (qNum/(total+1))*100);
    bar.style.width = pct + "%";

    if (step.type === "intro") return renderIntro();
    if (step.type === "result") return renderResult();
    if (step.type === "text") return renderText(step);
    return renderChoice(step);
  }

  function renderText(step) {
    var saved = answers[step.key] || {};
    var html =
      '<p class="eyebrow">Шаг</p>' +
      '<h2 class="q">'+esc(step.q)+'</h2>' +
      '<p class="q-hint">'+esc(step.hint)+'</p>';
    step.fields.forEach(function(f){
      html += '<input class="txt" data-k="'+f.k+'" placeholder="'+esc(f.ph)+'" value="'+esc(saved[f.k]||"")+'" autocomplete="off">';
    });
    html += navHtml(true);
    card.innerHTML = html;
    wireNav();
    var inputs = card.querySelectorAll("input.txt");
    inputs.forEach(function(inp){
      inp.oninput = function(){ saved[inp.getAttribute("data-k")] = inp.value; answers[step.key] = saved; validateText(step); };
      inp.onkeydown = function(e){ if(e.key==="Enter"){ var nx=document.getElementById("next"); if(nx && !nx.disabled) nx.click(); } };
    });
    validateText(step);
    if (inputs[0]) inputs[0].focus();
  }

  function validateText(step){
    var saved = answers[step.key] || {};
    var ok = step.fields.every(function(f){ return (saved[f.k]||"").trim().length>0; });
    var nx = document.getElementById("next");
    if (nx) nx.disabled = !ok;
  }

  function renderChoice(step) {
    var multi = step.type === "multi";
    var html =
      '<p class="eyebrow">'+(multi?"Можно несколько":"Один ответ")+'</p>' +
      '<h2 class="q">'+esc(step.q)+'</h2>' +
      '<p class="q-hint">'+esc(step.hint)+'</p>' +
      '<div class="opts">';
    step.opts.forEach(function(o){
      var on = multi ? (answers[step.key]||[]).indexOf(o.v)>=0 : answers[step.key]===o.v;
      html += '<button class="opt '+(multi?"":"round")+(on?" on":"")+'" data-v="'+o.v+'">' +
                '<span class="mark">'+CHK+'</span>' +
                '<span class="lbl">'+esc(o.l)+(o.s?'<small>'+esc(o.s)+'</small>':'')+'</span>' +
              '</button>';
    });
    html += '</div>' + navHtml(!multi ? false : true);
    card.innerHTML = html;
    wireNav();

    card.querySelectorAll(".opt").forEach(function(btn){
      btn.onclick = function(){
        var v = btn.getAttribute("data-v");
        if (multi) {
          var arr = answers[step.key] || [];
          var pos = arr.indexOf(v);
          if (pos>=0) arr.splice(pos,1); else arr.push(v);
          answers[step.key] = arr;
          btn.classList.toggle("on");
          var nx=document.getElementById("next"); if(nx) nx.disabled = arr.length===0;
        } else {
          answers[step.key] = v;
          setTimeout(function(){ go(idx+1)(); }, 180);
        }
      };
    });
    if (multi) { var nx=document.getElementById("next"); if(nx) nx.disabled = (answers[step.key]||[]).length===0; }

  function wireNav(){
    var b = document.getElementById("back");
    if (b) b.onclick = go(idx-1);
    var n = document.getElementById("next");
    if (n) n.onclick = go(idx+1);

  function go(to){
    return function(){
      if (to<0) return;
      idx = Math.max(0, Math.min(STEPS.length-1, to));
      render();
      window.scrollTo({top:0, behavior:"smooth"});
    };
  }

  // ---- Scoring ----
  function scoreLevel(){
    var s = 0, salesFocus = 0, finFocus = 0;

    var sizeStep = STEPS.find(function(x){return x.key==="size";});
    var sizeOpt = (sizeStep.opts.find(function(o){return o.v===answers.size;})||{});
    s += (sizeOpt.sc||0);

    var pains = answers.pains || [];
    var painStep = STEPS.find(function(x){return x.key==="pains";});
    s += Math.min(pains.length, 6) * 0.7;
    pains.forEach(function(v){
      var o = painStep.opts.find(function(x){return x.v===v;})||{};
      salesFocus += (o.sales||0); finFocus += (o.fin||0);
    });

    var hoursStep = STEPS.find(function(x){return x.key==="hours";});
    var hOpt = (hoursStep.opts.find(function(o){return o.v===answers.hours;})||{});
    s += (hOpt.sc||0);

    var goalStep = STEPS.find(function(x){return x.key==="goal";});
    var gOpt = (goalStep.opts.find(function(o){return o.v===answers.goal;})||{});
    salesFocus += (gOpt.sales||0); finFocus += (gOpt.fin||0);
    if (answers.goal==="all") s += 1.5;

    // base level by points
    var lvl;
    if (s < 3.5) lvl = 0;
    else if (s < 6) lvl = 1;
    else if (s < 8.5) lvl = 2;
    else lvl = 3;

    // overrides
    if (salesFocus >= 2 && lvl < 3 && s >= 5) lvl = 3;      // сильный фокус на продажи
    else if (finFocus >= 2 && lvl < 2 && s >= 4) lvl = 2;   // фокус на финансы/аналитику

    return { lvl: lvl, s: s, sales: salesFocus, fin: finFocus };
  }

  function roi(){
    var h = HOURS_MID[answers.hours] || 20;
    var r = RATE_VAL[answers.rate] || 45;
    var weekCost = h * r;
    var monthCost = weekCost * 4.33;
    var monthSave = monthCost * RUTINA_SHARE;
    var yearSave = monthSave * 12;
    return { monthCost: monthCost, monthSave: monthSave, yearSave: yearSave, hours: h };
  }

  function money(n){
    n = Math.round(n/50)*50;
    return "€" + n.toLocaleString("ru-RU").replace(/,/g," ");
  }

  function brief(res, R, L){
    var painStep = STEPS.find(function(x){return x.key==="pains";});
    var painLabels = (answers.pains||[]).map(function(v){ var o=painStep.opts.find(function(x){return x.v===v;}); return o?o.l:v; });
    var goalStep = STEPS.find(function(x){return x.key==="goal";});
    var goalL = (goalStep.opts.find(function(o){return o.v===answers.goal;})||{}).l||"-";
    var sizeStep = STEPS.find(function(x){return x.key==="size";});
    var sizeL = (sizeStep.opts.find(function(o){return o.v===answers.size;})||{}).l||"-";
    var matStep = STEPS.find(function(x){return x.key==="maturity";});
    var matL = (matStep.opts.find(function(o){return o.v===answers.maturity;})||{}).l||"-";
    var hoursStep = STEPS.find(function(x){return x.key==="hours";});
    var hoursL = (hoursStep.opts.find(function(o){return o.v===answers.hours;})||{}).l||"-";
    var rateStep = STEPS.find(function(x){return x.key==="rate";});
    var rateL = (rateStep.opts.find(function(o){return o.v===answers.rate;})||{}).l||"-";

    return [
      "НОВАЯ ДИАГНОСТИКА ИИЗАЦИИ",
      "",
      "Компания: " + (answers.company.name||"-") + " (" + (answers.company.field||"-") + ")",

      "",
      "[скоринг: pts " + res.s.toFixed(1) + ", sales " + res.sales + ", fin " + res.fin + "]"
    ].join("\n");
  }

  function copyBrief(res, R, L, openTg){
    var text = brief(res, R, L);
    var done = function(){
      showToast(openTg ? "Скопировано. Вставьте в чат (Ctrl+V / Cmd+V)" : "Результат скопирован");
      if (openTg) setTimeout(function(){ window.open(STAS_TG, "_blank"); }, 700);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text); done(); });
    } else { fallbackCopy(text); done(); }
  }
  function fallbackCopy(text){
    var ta = document.createElement("textarea");
    ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch(e){}
    document.body.removeChild(ta);
  }
  function showToast(msg){
    toast.textContent = msg; toast.classList.add("show");
    setTimeout(function(){ toast.classList.remove("show"); }, 2600);
  }

  render();
})();
</script>
